{% extends "base.html" %}

{% block title %}Post a Job — JobConnect{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border">
            <div class="card-body p-4">
                <h3 class="fw-bold mb-4">
                    <i class="bi bi-plus-circle text-primary"></i> Post a New Job
                </h3>

                <form method="POST" action="{{ url_for('jobs.new_job') }}">
                    <div class="mb-3">
                        <label class="form-label">Job Title</label>
                        <input type="text" name="title" class="form-control form-control-lg" placeholder="e.g. Senior Python Developer" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Company Name</label>
                            <input type="text" name="company" class="form-control form-control-lg" placeholder="e.g. TechCorp Inc." required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Location</label>
                            <input type="text" name="location" class="form-control form-control-lg" placeholder="e.g. Bangalore, India" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Job Type</label>
                            <select name="job_type" class="form-select form-select-lg" required>
                                <option value="">-- Select Type --</option>
                                <option value="Full-time">Full-time</option>
                                <option value="Part-time">Part-time</option>
                                <option value="Contract">Contract</option>
                                <option value="Internship">Internship</option>
                                <option value="Remote">Remote</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Salary (optional)</label>
                            <input type="text" name="salary" class="form-control form-control-lg" placeholder="e.g. ₹8-12 LPA">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Job Description</label>
                        <textarea name="description" class="form-control" rows="6" placeholder="Describe the role, responsibilities, and requirements..." required></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary btn-lg text-white">
                            <i class="bi bi-send"></i> Post Job
                        </button>
                        <a href="{{ url_for('jobs.employer_dashboard') }}" class="btn btn-outline-secondary btn-lg">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
