{% extends "base.html" %}

{% block title %}Edit Job — JobConnect{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border">
            <div class="card-body p-4">
                <h3 class="fw-bold mb-4">
                    <i class="bi bi-pencil-square text-primary"></i> Edit Job
                </h3>

                <form method="POST" action="{{ url_for('jobs.edit_job', job_id=job.id) }}">
                    <div class="mb-3">
                        <label class="form-label">Job Title</label>
                        <input type="text" name="title" class="form-control form-control-lg" value="{{ job.title }}" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Company Name</label>
                            <input type="text" name="company" class="form-control form-control-lg" value="{{ job.company }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Location</label>
                            <input type="text" name="location" class="form-control form-control-lg" value="{{ job.location }}" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Job Type</label>
                            <select name="job_type" class="form-select form-select-lg" required>
                                <option value="Full-time" {% if job.job_type == 'Full-time' %}selected{% endif %}>Full-time</option>
                                <option value="Part-time" {% if job.job_type == 'Part-time' %}selected{% endif %}>Part-time</option>
                                <option value="Contract" {% if job.job_type == 'Contract' %}selected{% endif %}>Contract</option>
                                <option value="Internship" {% if job.job_type == 'Internship' %}selected{% endif %}>Internship</option>
                                <option value="Remote" {% if job.job_type == 'Remote' %}selected{% endif %}>Remote</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Salary (optional)</label>
                            <input type="text" name="salary" class="form-control form-control-lg" value="{{ job.salary or '' }}">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Job Description</label>
                        <textarea name="description" class="form-control" rows="6" required>{{ job.description }}</textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary btn-lg text-white">
                            <i class="bi bi-check-circle"></i> Save Changes
                        </button>
                        <a href="{{ url_for('jobs.employer_dashboard') }}" class="btn btn-outline-secondary btn-lg">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
