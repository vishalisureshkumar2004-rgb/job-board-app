{% extends "base.html" %}

{% block title %}Sign In — JobConnect{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border mt-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-briefcase-fill text-primary" style="font-size: 2.5rem;"></i>
                    <h3 class="mt-2 fw-bold">Sign in to JobConnect</h3>
                    <p class="text-muted">Find your next career opportunity</p>
                </div>

                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" class="form-control form-control-lg" placeholder="you@example.com" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control form-control-lg" placeholder="••••••••" required>
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg text-white">
                            Sign In
                        </button>
                    </div>
                </form>

                <hr class="my-4">
                <p class="text-center mb-0">
                    New to JobConnect?
                    <a href="{{ url_for('auth.register') }}" class="fw-semibold">Join now</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
