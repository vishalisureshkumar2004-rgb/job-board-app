{% extends "base.html" %}

{% block title %}Join JobConnect{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border mt-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-briefcase-fill text-primary" style="font-size: 2.5rem;"></i>
                    <h3 class="mt-2 fw-bold">Create your account</h3>
                    <p class="text-muted">Start your career journey today</p>
                </div>

                <form method="POST" action="{{ url_for('auth.register') }}">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="full_name" class="form-control form-control-lg" placeholder="John Doe" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" class="form-control form-control-lg" placeholder="you@example.com" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control form-control-lg" placeholder="••••••••" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">I am a...</label>
                        <select name="role" class="form-select form-select-lg" required>
                            <option value="">-- Select Role --</option>
                            <option value="candidate">Candidate — Looking for jobs</option>
                            <option value="employer">Employer — Hiring talent</option>
                        </select>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg text-white">
                            Create Account
                        </button>
                    </div>
                </form>

                <hr class="my-4">
                <p class="text-center mb-0">
                    Already have an account?
                    <a href="{{ url_for('auth.login') }}" class="fw-semibold">Sign in</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
